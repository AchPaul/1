<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Мои теплицы - GrowHub</title>
<link rel="icon" type="image/svg+xml" href="favicon-plant.svg">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#28003c">
<meta name="referrer" content="no-referrer">
<link rel="stylesheet" href="theme.css">
</head>
<body>
<header>
<div class="logo"><span class="grow">Grow</span><span class="hub">Hub</span></div>
</header>
<div class="header-transition"></div>

<main class="main">
<div class="pwa-bar" id="pwa-bar" style="width:100%;max-width:400px">
<div class="greenhouse-select-wrap" id="greenhouse-selector">
<select class="greenhouse-select" id="greenhouse-select" aria-label="Выбор теплицы"></select>
<a href="greenhouses.html?add=1" class="greenhouse-add-btn" id="greenhouse-add-btn">+ Добавить теплицу</a>
<a href="greenhouses.html" class="greenhouse-manage-btn" title="Управление теплицами" aria-label="Управление теплицами">⚙</a>
</div>
<div class="pwa-status" id="pwa-status-line">Подключение...</div>
</div>

<h2>🌿 Мои теплицы</h2>

<div id="greenhouse-list" class="greenhouse-list"></div>

<div id="empty-state" class="gh-empty-state hidden">
<p>Теплицы не добавлены</p>
<p style="font-size:13px;margin-top:6px;color:#9a7aa8">Нажмите «Добавить теплицу» или откройте ссылку с контроллера</p>
</div>

<button type="button" id="btn-add" class="neon-buttom">➕ Добавить теплицу</button>

<div id="form-section" class="gh-form-section hidden">
<h3 id="form-title">Новая теплица</h3>
<input type="hidden" id="edit-id">
<div class="gh-form-row">
<div class="gh-form-group">
<label>Адрес MQTT брокера</label>
<input type="text" id="inp-host" placeholder="broker.example.com" autocomplete="off">
</div>
<div class="gh-form-group">
<label>Порт WSS</label>
<input type="text" id="inp-port" inputmode="numeric" placeholder="8884">
</div>
</div>
<div class="gh-form-row">
<div class="gh-form-group">
<label>Логин</label>
<input type="text" id="inp-user" autocomplete="username">
</div>
<div class="gh-form-group">
<label>Пароль</label>
<input type="password" id="inp-pass" autocomplete="current-password">
</div>
</div>
<div class="gh-form-group">
<label>Топик</label>
<input type="text" id="inp-base" placeholder="abc123/" autocomplete="off">
</div>
<div class="gh-form-group">
<label>HTTP устройства (опционально)</label>
<input type="text" id="inp-device-url" placeholder="http://192.168.1.50 — WiFi, логи, OTA">
</div>
<div class="gh-form-actions">
<button type="button" id="btn-cancel" class="gh-action-btn">Отмена</button>
<button type="button" id="btn-save" class="gh-action-btn primary">Сохранить</button>
</div>
</div>

<a href="index.html" class="neon-buttom btn-back">← На дашборд</a>
</main>

<script src="mqtt-simple.js"></script>
<script src="plant_config.js"></script>
<script src="app.js"></script>
<script>
(function(){
  const listEl = document.getElementById('greenhouse-list');
  const emptyEl = document.getElementById('empty-state');
  const formEl = document.getElementById('form-section');
  const formTitle = document.getElementById('form-title');
  const btnAdd = document.getElementById('btn-add');
  const btnCancel = document.getElementById('btn-cancel');
  const btnSave = document.getElementById('btn-save');

  const inpId = document.getElementById('edit-id');
  const inpHost = document.getElementById('inp-host');
  const inpPort = document.getElementById('inp-port');
  const inpUser = document.getElementById('inp-user');
  const inpPass = document.getElementById('inp-pass');
  const inpBase = document.getElementById('inp-base');
  const inpDeviceUrl = document.getElementById('inp-device-url');

  function renderList(){
    const greenhouses = window.ghGreenhouses.getAll();
    const activeId = window.ghGreenhouses.getActiveId();

    if(greenhouses.length === 0){
      listEl.innerHTML = '';
      listEl.classList.add('hidden');
      emptyEl.classList.remove('hidden');
      return;
    }

    listEl.classList.remove('hidden');
    emptyEl.classList.add('hidden');

    listEl.innerHTML = greenhouses.map(gh => `
      <div class="greenhouse-card ${gh.id === activeId ? 'active' : ''}" data-id="${gh.id}">
        <div class="greenhouse-card-header">
          <span class="greenhouse-name">${escapeHtml(gh.name || 'Новая теплица')}</span>
          ${gh.id === activeId ? '<span class="greenhouse-active-badge">Активная</span>' : ''}
        </div>
        <div class="greenhouse-info">
          <span>🌐 ${escapeHtml(gh.host)}:${escapeHtml(String(gh.port || ''))}</span>
          <span>📡 ${escapeHtml(gh.base || '')}</span>
          ${gh.deviceUrl ? `<span>🔗 ${escapeHtml(gh.deviceUrl)}</span>` : ''}
        </div>
        <div class="greenhouse-actions">
          ${gh.id !== activeId ? `<button type="button" class="gh-action-btn primary" onclick="selectGreenhouse('${gh.id}')">Выбрать</button>` : ''}
          <button type="button" class="gh-action-btn" onclick="editGreenhouse('${gh.id}')">✏️ Изменить</button>
          <button type="button" class="gh-action-btn danger" onclick="deleteGreenhouse('${gh.id}')">🗑️</button>
        </div>
      </div>
    `).join('');
  }

  function escapeHtml(str){
    if(!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showForm(editId){
    formEl.classList.remove('hidden');
    btnAdd.classList.add('hidden');

    if(editId){
      const gh = window.ghGreenhouses.getAll().find(g => g.id === editId);
      if(gh){
        formTitle.textContent = 'Редактирование';
        inpId.value = gh.id;
        inpHost.value = gh.host || '';
        inpPort.value = gh.port || '8884';
        inpUser.value = gh.user || '';
        inpPass.value = gh.pass || '';
        inpBase.value = gh.base || '';
        inpDeviceUrl.value = gh.deviceUrl || '';
      }
    } else {
      formTitle.textContent = 'Новая теплица';
      inpId.value = '';
      inpHost.value = '';
      inpPort.value = '8884';
      inpUser.value = '';
      inpPass.value = '';
      inpBase.value = '';
      inpDeviceUrl.value = '';
    }
    inpHost.focus();
  }

  function hideForm(){
    formEl.classList.add('hidden');
    btnAdd.classList.remove('hidden');
  }

  window.selectGreenhouse = function(id){
    window.ghGreenhouses.switch(id);
    renderList();
    window.ghGreenhouses.refreshSelector();
  };

  window.editGreenhouse = function(id){
    showForm(id);
    formEl.scrollIntoView({behavior:'smooth', block:'nearest'});
  };

  window.deleteGreenhouse = function(id){
    const gh = window.ghGreenhouses.getAll().find(g => g.id === id);
    if(gh && confirm(`Удалить теплицу "${gh.name || 'Новая теплица'}"?`)){
      window.ghGreenhouses.delete(id);
      renderList();
      window.ghGreenhouses.refreshSelector();
    }
  };

  btnAdd.addEventListener('click', () => showForm(null));
  btnCancel.addEventListener('click', hideForm);

  btnSave.addEventListener('click', () => {
    const host = inpHost.value.trim();
    const port = inpPort.value.trim() || '8884';
    const user = inpUser.value.trim();
    const pass = inpPass.value.trim();
    let base = inpBase.value.trim();
    const deviceUrl = inpDeviceUrl ? inpDeviceUrl.value.trim() : '';

    if(!host){
      alert('Введите адрес брокера');
      inpHost.focus();
      return;
    }
    if(!base){
      alert('Введите топик');
      inpBase.focus();
      return;
    }
    if(!base.endsWith('/')) base += '/';

    const config = { host, port, user, pass, base, proto: 'wss', deviceUrl };
    const editId = inpId.value;

    if(editId){
      window.ghGreenhouses.update(editId, config);
    } else {
      const newGh = window.ghGreenhouses.add(config);
      window.ghGreenhouses.setActive(newGh.id);
    }

    hideForm();
    renderList();
    window.ghGreenhouses.refreshSelector();
  });

  renderList();
  if(new URLSearchParams(location.search).has('add')){
    showForm(null);
  }
})();
</script>
</body>
</html>
