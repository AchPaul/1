<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GrowHub</title>
<link rel="icon" type="image/svg+xml" href="favicon-plant.svg">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#28003c">
<meta name="referrer" content="no-referrer">

<style>
:root{--clr-neon:hsl(288,52%,35%);--clr-bg:hsl(295,14%,67%)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased}
h2,h3{text-align:center;padding:0 6px;letter-spacing:.3px;color:#f0d6f7}
h2{font-size:21px;font-weight:700;color:#fff;text-shadow:0 0 18px rgba(201,0,204,.35)}
h3{margin-bottom:20px}
.neon-buttom{position:relative;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;max-width:300px;margin-left:auto;margin-right:auto;padding:14px 20px;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;font-size:15px;font-weight:600;letter-spacing:.3px;text-decoration:none;color:#f3d7fa;cursor:pointer;background:linear-gradient(160deg,rgba(34,0,46,.92) 0%,rgba(8,0,14,.92) 100%);border:1px solid rgba(201,0,204,.32);border-radius:14px;box-shadow:0 4px 12px rgba(0,0,0,.5),inset 0 0 12px rgba(201,0,204,.08);transition:transform .14s,border-color .2s,box-shadow .2s,color .2s}
.neon-buttom:disabled{background:#3d3b3d;color:#fff;cursor:wait}
.neon-buttom::before{content:none}
.neon-buttom::after{content:none}
.neon-buttom:hover,.neon-buttom:focus{border-color:rgba(201,0,204,.65);box-shadow:0 6px 18px rgba(0,0,0,.6),0 0 16px rgba(201,0,204,.28),inset 0 0 14px rgba(201,0,204,.12);color:#fff;outline:none}
.neon-buttom:active{transform:scale(.97)}
.neon-buttom:hover::before,.neon-buttom:focus::before,.neon-buttom:hover::after,.neon-buttom:focus::after{opacity:1}
.icon{position:relative}
.icon_btn{position:absolute;top:50%;left:16px;transform:translateY(-50%);display:flex;align-items:center;line-height:0}
.main{display:flex;margin:20px 0;justify-content:center;align-items:center;flex-direction:column;gap:25px}
.container{display:flex;flex-flow:row wrap;justify-content:center;align-items:center;margin-bottom:-10px}
.select-dropdown{position:relative;display:inline-block;max-width:60%;transition:all ease-in-out .3s}
.select-dropdown__button{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;padding:11px 14px;background:rgba(40,0,52,.9);color:#fff;border:1px solid rgba(201,0,204,.32);border-radius:12px;text-align:center;font-size:15px}
.select-dropdown__button:focus{outline:none}
.group_input{color:#fff;width:300px;max-width:calc(100vw - 34px);padding:12px 14px;border:1px solid rgba(201,0,204,.32);border-radius:14px;background:rgba(21,0,26,.72);font-size:16px}
.plant-search-input{width:100%;padding:11px 14px;background:rgba(40,0,52,.9);color:#fff;border:1px solid rgba(201,0,204,.32);border-radius:12px;font-size:15px;margin-bottom:10px}
.plant-search-input:focus{outline:0;border-color:#c900cc}
.plant-result{appearance:none;width:100%;text-align:left;padding:10px 12px;margin-bottom:6px;border:1px solid rgba(201,0,204,.28);border-radius:12px;background:rgba(21,0,26,.78);color:#fff;font-size:15px;cursor:pointer}
.plant-result.selected{border-color:rgba(201,0,204,.65);background:rgba(201,0,204,.18)}
.plant-search-hint{font-size:13px;color:#9a7aa8;text-align:center;margin-bottom:8px}
.plant-selected{font-size:14px;color:#d7b7df;text-align:center;margin-bottom:10px;min-height:20px}
header{height:75px;background:linear-gradient(135deg,#500078 0%,#28003c 100%);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 15px rgba(0,0,0,.5);position:relative;z-index:100}
.header-transition{height:56px;position:relative;overflow:hidden;background:linear-gradient(180deg,rgba(40,0,60,.98) 0%,rgba(31,0,45,.9) 26%,rgba(20,0,31,.72) 55%,rgba(9,0,16,.34) 82%,transparent 100%);margin-top:-8px;margin-bottom:8px}
.header-transition::before{content:'';position:absolute;inset:-20px 0 0;background:radial-gradient(ellipse at top,rgba(201,0,204,.2) 0%,rgba(120,0,180,.12) 34%,rgba(0,0,0,0) 72%);filter:blur(10px);pointer-events:none}
.header-transition::after{content:'';position:absolute;left:0;right:0;bottom:-8px;height:26px;background:linear-gradient(180deg,rgba(0,0,0,0) 0%,#000 100%);pointer-events:none}
.logo{margin-top:2px;display:inline-flex;align-items:center;gap:5px}
.grow{display:inline-block;font-size:30px;color:#fff;font-weight:600;letter-spacing:.2px;line-height:1;-webkit-text-stroke:.45px currentColor;transform:scaleX(1.18)}
.hub{display:inline-block;font-size:30px;color:#e95eeb;font-weight:600;letter-spacing:.2px;line-height:1;-webkit-text-stroke:.45px currentColor;transform:scaleX(1.18);border:4px solid #e95eeb;border-radius:10px;padding:4px;margin-left:12px}
</style>
<link rel="stylesheet" href="theme.css">
</head>
<body>
<header>
<div class="logo"><span class="grow">Grow</span><span class="hub">Hub</span></div>
</header>
<div class="header-transition"></div>
<main class="main">
<div class="pwa-bar" id="pwa-bar" style="width:100%;max-width:320px;margin:0 auto 10px">
<div class="greenhouse-select-wrap" id="greenhouse-selector">
<select class="greenhouse-select" id="greenhouse-select" aria-label="Выбор теплицы"></select>
<a href="greenhouses.html?add=1" class="greenhouse-add-btn" id="greenhouse-add-btn">+ Добавить теплицу</a>
<a href="greenhouses.html" class="greenhouse-manage-btn" title="Управление теплицами" aria-label="Управление теплицами">⚙</a>
</div>
<div class="pwa-status" id="pwa-status-line" style="font-size:11px;text-align:center;color:#9a7aa8;min-height:16px"></div>
</div>

<form action="/send_profile" method="POST">
<h2 style="margin-bottom:20px">Профили настроек</h2>
<div class="group_input" style="margin-bottom:20px">
<h3 style="margin-bottom:-5px">Пользовательские:</h3>
<div class="container" style="margin-bottom:20px">
<div class="select-dropdown">
<select name="profile" id="profile-select" class="select-dropdown__button" style="margin-top:20px">
<option value="0">Профиль 1</option>
<option value="1">Профиль 2</option>
<option value="2">Профиль 3</option>
<option value="3">Профиль 4</option>
<option value="4">Профиль 5</option>
</select>
</div>
</div>
<div style="text-align:center;margin-top:20px">
<input class="neon-buttom icon" type="submit" value="Сохранить"></input>
</div>
</div>
</form>
<form action="/send_plant" method="POST">
<div class="group_input" style="margin-bottom:20px">
<h3 style="margin-bottom:-5px">Заводские стадии:</h3>
<div class="container" style="margin-bottom:20px">
<div class="select-dropdown">
<select name="plant" id="stage-select" class="select-dropdown__button" style="margin-top:20px">
<option value=\"376\">Рассада</option>
<option value=\"377\">Вегетация</option>
<option value=\"378\">Цветение</option>
</select>
</div>
</div>
<div style="text-align:center;margin-top:20px">
<input class="neon-buttom icon" type="submit" value="Сохранить"></input>
</div>
</div>
</form>
<form action="/send_plant" method="POST" id="plant-form">
<h2 style="margin-bottom:20px">Поиск растения</h2>
<div class="group_input">
<input type="text" id="plant-search-input" class="plant-search-input" placeholder="Название (мин. 2 символа)" autocomplete="off" aria-label="Поиск растения">
<input type="hidden" name="plant" id="plant-id" value="">
<div id="plant-search-results"></div>
<div class="plant-selected" id="plant-selected"></div>
<div style="text-align:center;margin-top:20px">
<input class="neon-buttom icon" type="submit" id="plant-apply-btn" value="Применить" disabled></input>
</div>
</div>
</form>
<a class="neon-buttom icon" href="index.html">Выйти<div class="icon_btn"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#fff"><path d="M21 11H6.414l5.293-5.293-1.414-1.414L2.586 12l7.707 7.707 1.414-1.414L6.414 13H21z"/></svg></div></a>
</main>

<script src="plant_config.js"></script>
<script src="mqtt-simple.js?v=64"></script>
<script src="pwa-bridge.js?v=64"></script>

<script>
var plantSearchTimer=null;
function renderPlantResults(plants){
  var box=document.getElementById('plant-search-results');
  if(!box)return;
  box.innerHTML='';
  if(!plants||!plants.length){box.innerHTML='<div class="plant-search-hint">Ничего не найдено</div>';return;}
  plants.forEach(function(p){{
    var btn=document.createElement('button');
    btn.type='button';
    btn.className='plant-result';
    btn.textContent=p.n||'';
    btn.dataset.id=String(p.id);
    btn.addEventListener('click',function(){{selectPlant(p.id,p.n,btn);}});
    box.appendChild(btn);
  }});
}
function selectPlant(id,name,btnEl){
  var hid=document.getElementById('plant-id');
  if(hid)hid.value=String(id);
  var sel=document.getElementById('plant-selected');
  if(sel)sel.textContent='Выбрано: '+(name||'');
  var apply=document.getElementById('plant-apply-btn');
  if(apply)apply.disabled=false;
  document.querySelectorAll('.plant-result').forEach(function(b){{b.classList.remove('selected');}});
  if(btnEl)btnEl.classList.add('selected');
}
function runPlantSearch(q){
  q=(q||'').trim();
  var box=document.getElementById('plant-search-results');
  if(!box)return;
  if(q.length<2){box.innerHTML='<div class="plant-search-hint">Введите минимум 2 символа</div>';return;}
  fetch('/api/plants_search?q='+encodeURIComponent(q)+'&limit=12',{{cache:'no-store'}})
    .then(function(r){{return r.json();}})
    .then(function(d){{renderPlantResults(d.plants);}})
    .catch(function(){{renderPlantResults([]);}});
}
function bindPlantSearch(){
  var inp=document.getElementById('plant-search-input');
  if(!inp)return;
  inp.addEventListener('input',function(){{
    clearTimeout(plantSearchTimer);
    plantSearchTimer=setTimeout(function(){{runPlantSearch(inp.value);}},400);
  }});
}
bindPlantSearch();function loadProfileConfig(){
  fetch('/api/profile_config',{cache:'no-store'}).then(function(r){return r.json()}).then(function(d){
    var ps=document.getElementById('profile-select');
    var ss=document.getElementById('stage-select');
    if(ps&&d.cur_preset>=0&&d.cur_preset<=4)ps.value=String(d.cur_preset);
    if(ss&&d.stage_seedling!==undefined){
      ss.querySelector('option:nth-child(1)').value=String(d.stage_seedling);
      ss.querySelector('option:nth-child(2)').value=String(d.stage_vegetative);
      ss.querySelector('option:nth-child(3)').value=String(d.stage_flowering);
      if(d.cur_preset==d.stage_seedling||d.cur_preset==d.stage_vegetative||d.cur_preset==d.stage_flowering)
        ss.value=String(d.cur_preset);
    }
    if(d.cur_preset>=5&&d.cur_preset<376&&d.cur_plant_name){
      var inp=document.getElementById('plant-search-input');
      if(inp)inp.value=d.cur_plant_name;
      selectPlant(d.cur_preset,d.cur_plant_name,null);
      var cur=document.getElementById('plant-selected');
      if(cur)cur.textContent='Текущий: '+d.cur_plant_name;
    }
  }).catch(function(){});
}
loadProfileConfig();
document.querySelectorAll('form').forEach(function(f){f.addEventListener('submit',function(e){e.preventDefault();var btn=f.querySelector('input[type="submit"]');if(!btn||btn.disabled)return;var orig=btn.value;btn.disabled=true;btn.value='...';fetch(f.action,{method:'POST',body:new FormData(f)}).then(function(r){return r.json().then(function(d){return {ok:r.ok,data:d};});}).then(function(res){btn.value=(res.ok&&res.data&&res.data.ok)?'Сохранено ✓':'Ошибка';if(res.ok&&res.data&&res.data.ok)loadProfileConfig();setTimeout(function(){btn.value=orig;btn.disabled=false},2000)}).catch(function(){btn.value='Ошибка';setTimeout(function(){btn.value=orig;btn.disabled=false},2000)})})});
</script>

<script src="app.js?v=64"></script>

</body>
</html>
